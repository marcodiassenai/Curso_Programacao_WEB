<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link rel="stylesheet" href=".\login.css">


</head>

<body>

<div class="login-card">

<div class="logo">
    <img class="logo_Projeto" src=".\Logo_Projeto.jpeg" alt="Logo">
</div>

<h1>Bem-vindo</h1>

<p>Entre em sua conta</p>

<form onsubmit="fazerLogin(event)">

<div class="form-group">

<label>Email</label>

<div class="input-box">

<i class="fa-solid fa-envelope"></i>

<input
type="email"
id="email"
placeholder="Digite seu email"
required>

</div>

</div>

<div class="form-group">

<label>Senha</label>

<div class="input-box">

<i class="fa-solid fa-lock"></i>

<input
type="password"
id="senha"
placeholder="Digite sua senha"
required>

</div>

</div>

<button class="botaoEntrar" type="submit">

Entrar

</button>

</form>

<div class="cadastro">

Não possui conta?
<button class="botaoCadastro" id="botao_Cadastro"><a href="#">Cadastre-se</a></button>

</div>


</div>

<!-- rodape da pagina -->
<footer class="rodape">
    © 2026 DML - Developers. Todos os direitos reservados.
</footer> 



<script src=".\login.js"></script>

</body>
</html>
