<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Portal do Aluno </title>
    <meta name="author" content="Marco Dias">
    <meta name="keywords" content="aula, web, programação">
    <link rel="stylesheet" href=".\style.css">
</head>

<body>      
    <div class="header">
        <div class="cabecalho">
            <div class="coluna1h"> 
                <h4>PORTAL DO ALUNO </h4>
            </div>
            <div class="coluna2h">
                <input type="text" class="search-input" placeholder="Pesquise aqui...">
                <button class="search-btn">🔍</button>
                
                <!-- dados para criar o envelope do email -->
                <svg class="icon-email" viewBox="0 0 24 24">
                    <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
                </svg>

                
            </div>
        </div>
        
    </div>

    <div class="body">
        <div class="menu"> 
            <h3 class="textoMenu"> MENU </h3>
            <p> Início </p>
            <p> Cadastro de Produtos </p>
            <p> Meus Produtos </p>
            <p> Preços </p>
            <p> Configurações </p>
        </div>

        <div class="cadastro">
            <div class="grid">
                <div class="colCadastro">
                    <h3> Informações Básicas </h3>
                    
                    <label> Nome do Produtor </label>
                    <label> Descrição Curta </label>
                    <textarea name="descricao" id="descricao1"></textarea>

                    <label> Categoria </label>
                    <select name="categoria" id="categoria1">
                        <option value="vestuario"> Vestuário </option>
                        <option value="Eletronicos"> Eletrônicos </option>
                        <option value="Alimentos"> Alimentos </option>                        
                    </select>
                </div>

                <div class="colCadastro">
                    <h3> Definição de Preço </h3>

                    <label> Preço de Venda (R$) </label>
                    <input id="precoVenda" type="number">

                    <label> Preço de Custo (R$) </label>
                    <input id="precoCusto" type="number">
                </div>

                <div class="colCadastro">
                    <h3> Estoque e Midia </h3>

                    <label> Quantidade em Estoque </label>
                    <input id="estoque" type="number">

                    <div class="upload"> Upload</div>
                </div>

            </div>

            <div class="actions">
                    <button class="primary"> Cadastrar Produtos </button>
                    <button class="primary"> Limpar Formulário </button>
            </div>

        </div>
        
    </div>

    <script src=".\js\script.js"></script> 

</body>
