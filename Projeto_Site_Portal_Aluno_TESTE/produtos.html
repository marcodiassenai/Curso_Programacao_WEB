<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Aba dos Produtos </title>
    <meta name="author" content="Marco Dias">
    <meta name="keywords" content="aula, web, programação">
    <link rel="stylesheet" href=".\style.css">
</head>

<body>      
    <div class="header">
        <div class="cabecalho">
            <div class="coluna1h"> 
                <h2> Portal do Aluno </h2>
            </div>

            <div class="coluna2h">
                <input type="text" id="search_input" placeholder="Pesquise aqui...">
                <button onclick="botao_pesquisa()" class="search-btn" > 🔍 </button>
                
                <!-- dados para criar o envelope do email -->
                <button onclick="botaoemail()" id="botao_email"> 
                    <svg class="icon-email" viewBox="0 0 24 24">
                        <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
                    </svg>
                </button>
                
            </div>

            <div class="coluna3h">
                <div class="login-box">
                    <form>
                        <input type="text" placeholder="Usuário" required>
                        <input type="password" placeholder="Senha" required>
                        <button type="submit">Entrar</button>
                    </form>
                </div>
            </div>

        </div>
        
    </div>

    <div class="corpo">
        <div class="menu"> 
            <h3 class="textoMenu"> MENU </h3>
            <div class="indice">
                <button onclick="botaoInicio()" id="botao_Inicio"> 🏠 Inicio </button> <br>
                <button onclick="cadastroProduto()" id="cadastro_Produto"> 📦 Cadastro de Produto </button> <br>
                <button onclick="meusprodutos()" id="meus_produtos"> 🛒 Meus Produtos </button> <br>
                <button onclick="botaopreco()" id="botao_preco"> 💰 Preço </button> <br>
                <button onclick="botaoConfiguracoes()" id="botao_Configuracoes"> ⚙️  Configurações </button> <br>
              </div>  
            <hr> 

            <div class="menuLista">
                <p class="textoLista"> LISTA </p>
                <p class="msgLista" id="msg_Lista"></p>

                <li id="listaProduto"></li>
            </div>
        </div>

        <div class="cadastro">
            

        </div>
        
    </div>

    <script src=".\js\script.js"></script> 

</body>
