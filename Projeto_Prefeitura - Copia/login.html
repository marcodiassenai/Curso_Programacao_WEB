<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{
--primary:#0f766e;
--primary-light:#14b8a6;
--bg:#eef3f6;
--text:#0f172a;
--gray:#64748b;
}

body{

font-family:'Inter',sans-serif;

background:var(--bg);

height:100vh;

display:flex;
justify-content:center;
align-items:center;

overflow:hidden;
}

/* FUNDO */

body::before{

content:"";

position:absolute;

width:500px;
height:500px;

background:linear-gradient(
135deg,
var(--primary),
var(--primary-light)
);

border-radius:50%;

top:-150px;
right:-100px;

filter:blur(80px);

opacity:0.4;

}

/* CARD LOGIN */

.login-card{

width:420px;

padding:35px;

background:rgba(255,255,255,0.75);

backdrop-filter:blur(16px);

border:1px solid rgba(255,255,255,0.5);

border-radius:30px;

box-shadow:
0 15px 40px rgba(0,0,0,0.08);

z-index:10;

}

.logo{

width:70px;
height:70px;

margin:auto;

border-radius:22px;

display:flex;
align-items:center;
justify-content:center;

font-size:28px;

background:linear-gradient(
135deg,
var(--primary),
var(--primary-light)
);

color:white;

margin-bottom:20px;

}

.logo_Projeto {
    width:100px;
    height:100px;
    border-radius: 1rem;
}

h1{

text-align:center;

color:var(--text);

margin-bottom:8px;

}

p{

text-align:center;

color:var(--gray);

margin-bottom:30px;

}

/* INPUTS */

.form-group{

margin-bottom:20px;

}

.form-group label{

display:block;

margin-bottom:8px;

font-weight:600;

color:#334155;

}

.input-box{

display:flex;
align-items:center;

background:#f8fafc;

border:1px solid #e2e8f0;

border-radius:18px;

padding:15px;

gap:10px;

}

.input-box i{

color:var(--gray);

}

.input-box input{

border:none;

outline:none;

background:transparent;

width:100%;

font-size:15px;

}

/* BOTÃO */

button{

width:100%;
height:58px;

border:none;

border-radius:18px;

background:linear-gradient(
135deg,
var(--primary),
var(--primary-light)
);

color:white;

font-size:16px;
font-weight:700;

cursor:pointer;

transition:.3s;

box-shadow:
0 10px 25px rgba(15,118,110,0.25);

}

button:hover{

transform:translateY(-2px);

}

.cadastro{

margin-top:18px;

text-align:center;

font-size:14px;

}

.cadastro a{

color:var(--primary);

font-weight:bold;

text-decoration:none;

}

</style>

</head>

<body>

<div class="login-card">

<div class="logo">
    <img class="logo_Projeto" src=".\Imagens\Logo_Projeto.jpeg" alt="Logo">
</div>

<h1>Bem-vindo</h1>

<p>Entre em sua conta</p>

<form onsubmit="fazerLogin(event)">

<div class="form-group">

<label>Email</label>

<div class="input-box">

<i class="fa-solid fa-envelope"></i>

<input
type="email"
id="email"
placeholder="Digite seu email"
required>

</div>

</div>

<div class="form-group">

<label>Senha</label>

<div class="input-box">

<i class="fa-solid fa-lock"></i>

<input
type="password"
id="senha"
placeholder="Digite sua senha"
required>

</div>

</div>

<button type="submit">

Entrar

</button>

</form>

<div class="cadastro">

Não possui conta?
<a href="#">Cadastre-se</a>

</div>

</div>

<script>

function fazerLogin(event){

    // impede recarregar a página
    event.preventDefault();

    let email =
    document.getElementById("email").value;

    let senha =
    document.getElementById("senha").value;

    // usuário de teste
    if(
        email === "teste@teste.com"
        &&
        senha === "1234"
    ){

        alert("Login realizado com sucesso!");

        // redireciona para a página
        window.location.href =
        "projetoFinal.html";

    }

    else{

        alert(
            "Email ou senha incorretos!"
        );

    }

}

</script>


</body>
</html>
