<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Tela de Login </title>
    <meta name="author" content="Marco Dias">
    <meta name="keywords" content="aula, web, programação">
    <link rel="stylesheet" href=".\style.css">
</head>


<body>
    <div class="container">
        <button class="acesse"> Acesse sua Conta </button>
        <button class="registra"> Registre-se </button> 
    
        <h1> Bem Vindo ao Sistema </h1>
        <form>
            <div class="contfilho">
                <label for="loginUser"> Usuário </label>
                <input type="text"  id="digiteUsuario" placeholder="Digite o Usuário"> <br> <br>
                <label for="loginSenha"> Senha </label>
                <input type="password" id="dititeSenha" placeholder="Digite sua Senha"> <br> <br>
            </div>
        </form>

        <button onclick="botaoEntrar()" class="botao"> Entrar </button>
    </div>
    

</body>
