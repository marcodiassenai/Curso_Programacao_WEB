<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Tela de Login </title>
    <meta name="author" content="Marco Dias">
    <meta name="keywords" content="aula, web, programação">
    <link rel="stylesheet" href=".\style.css">
</head>


<body>
    <div class="container">
        <div class="botoes">
            <button class="acesse"> Acesse sua Conta </button>
            <button class="registra"> Registre-se </button> 
        </div>    

        <h1> Bem Vindo ao Sistema </h1> 
        <form>
            <div class="contfilho">
                <div class="label"> 
                    <label for="loginUser"> Usuário: </label>
                    <label for="loginSenha"> Senha: </label>
                </div>
                
                <div class="input">
                    <input type="text"  id="digiteUsuario" placeholder="Digite o Usuário"> 
                    <input type="password" id="dititeSenha" placeholder="Digite sua Senha"> 
                </div>
                
            </div>
 

            <div> 
                <button onclick="botaoEntrar()" class="enter"> Entrar </button>
            </div>
            
        </form>

        
    </div>
    
    <script src=".\js\script.js"></script> 

</body>
